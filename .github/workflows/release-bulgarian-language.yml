name: Package and release Bulgarian Language

on:
  push:
    tags:
      - "bulgarian-language-v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Package version"
        required: true
        default: "0.1.0"

permissions:
  contents: write

jobs:
  package:
    runs-on: windows-latest

    steps:
      - name: Check out source
        uses: actions/checkout@v7

      - name: Determine version
        id: version
        shell: pwsh
        run: |
          if ("${{ github.event_name }}" -eq "push") {
            $version = "${{ github.ref_name }}".Replace("bulgarian-language-v", "")
          }
          else {
            $version = "${{ inputs.version }}"
          }
          "version=$version" >> $env:GITHUB_OUTPUT

      - name: Validate translation table
        shell: pwsh
        run: .\Bulgarian_language\scripts\qa-terminology.ps1

      - name: Package verified binaries
        shell: pwsh
        run: .\Bulgarian_language\scripts\package-release.ps1 -Version "${{ steps.version.outputs.version }}" -UsePrebuilt

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v7
        with:
          name: DiveOrDieBulgarianLanguage-${{ steps.version.outputs.version }}
          path: Bulgarian_language/dist/DiveOrDieBulgarianLanguage-${{ steps.version.outputs.version }}.zip

      - name: Publish GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $archive = (Resolve-Path "Bulgarian_language/dist/DiveOrDieBulgarianLanguage-${{ steps.version.outputs.version }}.zip").Path
          if (gh release view "${{ github.ref_name }}" 2>$null) {
            gh release upload "${{ github.ref_name }}" $archive --clobber
          }
          else {
            gh release create "${{ github.ref_name }}" $archive `
              --title "DIVE or DIE – Bulgarian Language ${{ steps.version.outputs.version }}" `
              --notes-file "Bulgarian_language/CHANGELOG.md"
          }
