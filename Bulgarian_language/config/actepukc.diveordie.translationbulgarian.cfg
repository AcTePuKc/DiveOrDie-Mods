## Settings for Dive or Die Bulgarian Translation

[Probe]

## Keep enabled during reconnaissance only. Generated dumps stay local and are not redistributed.
DumpLoadedBundles = false

## Extract localization table keys and values to the local dumps folder.
DumpLocalizationTables = false

## Enable detailed selector/localization path logging for troubleshooting.
TraceUiEvents = false

[Translation]

## Apply the translated entries from labels.txt at runtime.
EnableTranslationOverrides = true

## Dedicated Bulgarian locale code. The mod activates and persists its index 10 slot.
TranslationLocaleCode = bg
